<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HERTA SYSTEM — Andrian Kreidehüter</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div id="scan"></div>

<div class="top-bar">
  <div class="dual">
    <div class="glyph">HERTA SYSTEM</div>
    <div class="latin">System Interface</div>
  </div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">
    <div class="module" onclick="openModule('profile')">PROFILE</div>
    <div class="module" onclick="openModule('archive')">ARCHIVE</div>
    <div class="module" onclick="openModule('chronicles')">CHRONICLES</div>
    <div class="module" onclick="openModule('fragments')">FRAGMENTS</div>
  </div>

  <!-- CENTER -->
  <div class="core" id="core"></div>

  <!-- RIGHT -->
  <div class="panel right">
    <div class="dual">
      <div class="glyph">SYSTEM STATUS</div>
      <div class="latin">Operational</div>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <div class="dual">
    <div class="glyph" id="log">[SYS] READY</div>
    <div class="latin" id="logLatin">System ready</div>
  </div>
</div>

<!-- DATA -->
<script src="data/profile.js"></script>
<script src="data/updates.js"></script>
<script src="data/chronicles.js"></script>
<script src="data/fragments.js"></script>

<!-- CORE -->
<script src="script.js"></script>

</body>
</html>
