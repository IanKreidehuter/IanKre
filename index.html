<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HERTA SYSTEM — Andrian Kreidehüter</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
  <div class="dual" data-text="ENTITY SYSTEM V3.7"></div>
  <div class="dual" data-text="STATUS: ONLINE"></div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">
    <div class="dual" data-text="IDENTITY DATA"></div>
    <div class="dual" data-text="ANDRIAN KREIDEHÜTER"></div>
    <div class="dual" data-text="UNKNOWN ORIGIN"></div>
  </div>

  <!-- CENTER -->
  <div class="core" id="core">
    <div class="overlay">
      <img src="assets/images/profile.jpg" class="avatar">
      <div class="dual" data-text="ANDRIAN KREIDEHÜTER"></div>
      <div class="dual" data-text="CONNECTION STABLE"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel right">

    <div class="module" onclick="openModule('stored')">
      <div class="dual" data-text="STORED DATA"></div>
    </div>

    <div class="module" onclick="openModule('signals')">
      <div class="dual" data-text="INCOMING SIGNALS"></div>
    </div>

    <div class="module" onclick="openModule('fragments')">
      <div class="dual" data-text="LINKED ENTITIES"></div>
    </div>

  </div>

</div>

<div class="bottom-bar">
  <div class="dual" data-text="[SYS] SYSTEM STABLE"></div>
</div>

<!-- DATA -->
<script src="data/profile.js"></script>
<script src="data/updates.js"></script>
<script src="data/fragments.js"></script>

<!-- SYSTEM -->
<script src="script.js"></script>

</body>
</html>
