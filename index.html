<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HERTA SYSTEM — Andrian Kreidehüter</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- SCAN EFFECT -->
<div id="scan"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="dual">
    <div class="glyph">HERTA SYSTEM</div>
    <div class="latin">Central Interface</div>
  </div>

  <div class="dual">
    <div class="glyph">UNIT — AK-01</div>
    <div class="latin">Andrian Kreidehüter</div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel left">
    <div class="section">
      <div class="dual">
        <div class="glyph">IDENTITY NODE</div>
        <div class="latin">Profile Access</div>
      </div>
    </div>

    <div class="section">
      <div class="dual">
        <div class="glyph">STATUS</div>
        <div class="latin">Stable / Online</div>
      </div>
    </div>
  </div>

  <!-- CENTER PANEL (THIS IS YOUR STORED DATA) -->
  <div class="core" id="core">
    <!-- JS will inject everything here -->
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel right">
    <div class="section">
      <div class="dual">
        <div class="glyph">SYSTEM MODULES</div>
        <div class="latin">Passive Monitoring</div>
      </div>
    </div>

    <div class="section">
      <div class="dual">
        <div class="glyph">SIGNAL</div>
        <div class="latin">Connected</div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="dual">
    <div class="glyph" id="log">[SYS] READY</div>
    <div class="latin" id="logLatin">System initialized</div>
  </div>
</div>

<!-- DATA FILES -->
<script src="data/profile.js"></script>
<script src="data/updates.js"></script>
<script src="data/chronicles.js"></script>
<script src="data/fragments.js"></script>

<!-- CORE LOGIC -->
<script src="script.js"></script>

</body>
</html>
