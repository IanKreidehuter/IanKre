<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Flow</title>

<style>
body{
  margin:0;
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* container */
.container{
  position:relative;
  width:500px;
  height:500px;
}

/* text */
.word{
  position:absolute;
  color:#ff7aa8;
  font-size:20px; /* 🔥 bigger */

  white-space:nowrap;

  opacity:0;

  animation:flow 4.5s linear infinite; /* 🔥 slower */

  text-shadow:0 0 8px rgba(255,120,160,0.6);
}

/* smoother fade */
@keyframes flow{
  0%{ opacity:0; }
  25%{ opacity:0.3; }
  50%{ opacity:1; }
  75%{ opacity:0.3; }
  100%{ opacity:0; }
}
</style>
</head>

<body>

<div class="container" id="heart"></div>

<script>
const container = document.getElementById("heart");

/* heart math */
function heart(t){
  return {
    x: 16 * Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
  };
}

/* 🔥 fewer points = more spacing */
const total = 90;

for(let i=0;i<total;i++){

  const t = (i / total) * Math.PI * 2;
  const pos = heart(t);

  const el = document.createElement("div");
  el.className = "word";
  el.innerText = "I love you";

  const scale = 14; /* 🔥 slightly bigger shape */

  el.style.left = (250 + pos.x * scale) + "px";
  el.style.top  = (250 + pos.y * scale) + "px";

  /* smooth wave timing */
  el.style.animationDelay = (i * 0.05) + "s";

  container.appendChild(el);
}
</script>

</body>
</html>
