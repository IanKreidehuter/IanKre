<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart</title>

<style>
body{
  margin:0;
  background:#020305;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  perspective:1200px;
  font-family:Arial, sans-serif;
}

/* container */
.container{
  position:relative;
  transform-style:preserve-3d;
  animation:rotate 20s linear infinite;
}

/* words */
.word{
  position:absolute;
  color:#ff8fb1;
  font-size:14px;
  white-space:nowrap;

  opacity:0;
  animation:fade 4s ease-in-out infinite;

  text-shadow:
    0 0 6px rgba(255,140,180,0.6),
    0 0 14px rgba(255,100,150,0.4);

  transition:0.3s;
}

/* rotation */
@keyframes rotate{
  0%   { transform:rotateY(0deg) rotateX(12deg); }
  100% { transform:rotateY(360deg) rotateX(12deg); }
}

/* fade */
@keyframes fade{
  0%,100%{ opacity:0; transform:scale(0.8); }
  50%{ opacity:1; transform:scale(1); }
}
</style>
</head>

<body>

<div class="container" id="heart"></div>

<script>
const container = document.getElementById("heart");

/* heart formula */
function heart(t){
  return {
    x: 16 * Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
  };
}

/* generate particles */
for(let i=0;i<260;i++){

  const t = Math.random()*Math.PI*2;
  const pos = heart(t);

  const el = document.createElement("span");
  el.className = "word";
  el.innerText = "I love you";

  /* position */
  const scale = 14;
  el.style.left = (pos.x * scale) + "px";
  el.style.top  = (pos.y * scale) + "px";

  /* depth */
  const z = Math.random()*300 - 150;
  el.style.transform = `translateZ(${z}px)`;

  /* blur based on depth */
  const blur = Math.abs(z) / 120;
  el.style.filter = `blur(${blur}px)`;

  /* random timing */
  el.style.animationDelay = (Math.random()*4) + "s";

  /* floating movement */
  el.animate([
    { transform: `translateZ(${z}px) translateY(0px)` },
    { transform: `translateZ(${z}px) translateY(-6px)` },
    { transform: `translateZ(${z}px) translateY(0px)` }
  ],{
    duration: 3000 + Math.random()*2000,
    iterations: Infinity,
    easing: "ease-in-out"
  });

  container.appendChild(el);
}
</script>

</body>
</html>
